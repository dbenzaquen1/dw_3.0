version: 2

seeds:
  - name: seed_cru
    description: "CRU (Commodity Research Unit) price data for steel commodities. Contains historical and current pricing information for various steel products including cold-rolled coil, hot-rolled coil, and galvanized products. Data includes different time frequencies (yearly, quarterly, monthly, weekly) and pricing types (spot price, base price, etc.)."
    columns:
      - name: Commodity_Group
        description: "The commodity group classification (e.g., Steel - Carbon)."
        data_type: string
        quote: true
      - name: Price_Detail
        description: "Detailed description of the pricing information including product type and pricing method."
        data_type: string
        quote: true
      - name: Price_Type
        description: "The type of price (e.g., Point)."
        data_type: string
        quote: true
      - name: MARKET
        description: "The market location and terms (e.g., USA, Midwest, FOB)."
        data_type: string
        quote: true
      - name: Unit_of_Measurement
        description: "The unit of measurement for the price (e.g., USD/t)."
        data_type: string
        quote: true
      - name: PRICEID
        description: "Unique identifier for the price record."
        data_type: string
        quote: true
      - name: Unit
        description: "The unit of the price (e.g., USD/t)."
        data_type: string
        quote: true
      - name: Date
        description: "The date or period for the price data (can be yearly, quarterly, monthly, or weekly format)."
        data_type: string
        quote: true
      - name: Value
        description: "The price value in the specified unit."
        data_type: numeric
        quote: true

  - name: seed_gl_master
    description: "General Ledger master chart of accounts for Quality Metals. Contains all GL account numbers, descriptions, classifications, and organizational structure for financial reporting."
    columns:
      - name: GLNumber
        description: "General Ledger account number."
        data_type: string
        quote: true
      - name: Comments
        description: "Additional comments or notes for the account."
        data_type: string
        quote: true
      - name: Description
        description: "Account description and name."
        data_type: string
        quote: true
      - name: FSfunction
        description: "Financial statement function (Balance Sheet, P & L)."
        data_type: string
        quote: true
      - name: RatioCode
        description: "Code used for ratio calculations and financial analysis."
        data_type: string
        quote: true
      - name: GLLevel
        description: "Hierarchical level of the account in the chart of accounts."
        data_type: int64
        quote: true
      - name: RatioCodeDesc
        description: "Description of the ratio code."
        data_type: string
        quote: true
      - name: coaddress1
        description: "Company address line 1."
        data_type: string
        quote: true
      - name: coaddress2
        description: "Company address line 2."
        data_type: string
        quote: true
      - name: cocity
        description: "Company city."
        data_type: string
        quote: true
      - name: costate
        description: "Company state."
        data_type: string
        quote: true
      - name: cozip
        description: "Company ZIP code."
        data_type: string
        quote: true
      - name: CompanyName
        description: "Company name (Quality Metals)."
        data_type: string
        quote: true
      - name: DrCrAcct
        description: "Debit/Credit account type (D for debit, C for credit)."
        data_type: string
        quote: true
      - name: SubtotalGLNumber
        description: "Parent GL account number for subtotaling."
        data_type: string
        quote: true
      - name: Inactive
        description: "Whether the account is inactive (True/False)."
        data_type: boolean
        quote: true
      - name: HideInactive
        description: "Whether to hide inactive accounts in reports (True/False)."
        data_type: boolean
        quote: true

  - name: seed_daily_targets
    description: "Daily sales targets for the organization. Contains target amounts for each day, with zero targets for weekends and holidays."
    columns:
      - name: Date_value
        description: "The date for the target."
        data_type: date
        quote: true
      - name: Daily_Target
        description: "The daily sales target amount in dollars."
        data_type: numeric
        quote: true

  - name: seed_sales_target
    description: "Monthly sales targets for the organization. Contains target amounts for each month."
    columns:
      - name: Month_Start_Date
        description: "The first day of the month for the target."
        data_type: date
        quote: true
      - name: Sales_Target
        description: "The monthly sales target amount in dollars."
        data_type: numeric
        quote: true

  - name: codereadr_usernames_seed
    description: "CodeReader system usernames and user information. Contains user credentials and status for the CodeReader inventory management system."
    columns:
      - name: username
        description: "The username for the CodeReader system."
        data_type: string
        quote: true
      - name: is_active
        description: "Whether the user account is active (0 = inactive, 1 = active)."
        data_type: string
        quote: true
      - name: user_id
        description: "Unique identifier for the user in the CodeReader system."
        data_type: string
        quote: true

  - name: seed_codereadr_devices
    description: "CodeReader device inventory. Contains information about physical CodeReader devices used for inventory scanning."
    columns:
      - name: device_name
        description: "The name or identifier of the CodeReader device."
        data_type: string
        quote: true
      - name: device_id
        description: "Unique identifier for the device."
        data_type: int64
        quote: true

  - name: inventory_status_seed
    description: "Inventory status codes and descriptions. Contains the mapping between status codes and their descriptions for inventory management."
    columns:
      - name: status_code
        description: "The status code used in the inventory system."
        data_type: string
        quote: true
      - name: description
        description: "Description of what the status code represents."
        data_type: string
        quote: true 

  - name: seed_galvanized_pricing
    description: "Nucor Galvanized Pricing Table C. Contains pricing for galvanized steel by thickness range and coating grade. Each row represents a unique combination of thickness range (inches), grade, and price per 100 weight. Used for quoting and cost analysis."
    columns:
      - name: from_in
        description: "Lower bound of the thickness range in inches."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: to_in
        description: "Upper bound of the thickness range in inches."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: grade
        description: "Galvanized coating grade (e.g., G30, G40, 50G50G, etc.)."
        data_type: string
        quote: true
        tests:
          - not_null
      - name: price
        description: "Numeric price per 100 weight for the specified thickness range and grade. Blank if not inquire."
        data_type: numeric
        quote: true 
      - name: effective_start_timestamp
        description: "The timestamp when this price becomes effective (ISO 8601 format, e.g., 2025-07-16T11:14:00). Used for versioning and historical pricing."
        data_type: datetime
        quote: true
        tests:
          - not_null
      - name: effective_end_timestamp
        description: "The timestamp when this price is no longer effective (ISO 8601 format). '1900-01-01' is used to represent effectively null/active records."
        data_type: datetime
        quote: true

  - name: seed_ingot_prices
    description: "Historical nickel ingot pricing data sourced from Tachen Metals (https://www.tachen.com/nickel/nickelrpt.asp). Contains daily cash prices, 3-month futures, and Midwest premium prices for nickel ingots. Data is used for cost analysis, pricing models, and market trend analysis. Prices are in USD per pound."
    columns:
      - name: date
        description: "The date for the price data (YYYY-MM-DD format)."
        data_type: date
        quote: true
        tests:
          - not_null
      - name: cash_price
        description: "Daily cash price for nickel ingots in USD per pound. Represents the spot market price."
        data_type: numeric
        quote: true
      - name: 3_month
        description: "3-month futures price for nickel ingots in USD per pound. Represents forward market pricing."
        data_type: numeric
        quote: true
      - name: midwest_price
        description: "Midwest premium price for nickel ingots in USD per pound. Includes regional premium over the base price."
        data_type: numeric
        quote: true

  - name: seed_texarkana_width_adders
    description: "Texarkana width-based pricing adders for steel products. Contains pricing adjustments based on width ranges for the Texarkana facility."
    columns:
      - name: min_width
        description: "Minimum width in inches for this pricing tier."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: max_width
        description: "Maximum width in inches for this pricing tier."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: amount
        description: "Pricing adder amount for this width range."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: effective_start_date
        description: "The date when this pricing becomes effective (YYYY-MM-DD format)."
        data_type: date
        quote: true
        tests:
          - not_null
      - name: effective_end_date
        description: "The date when this pricing is no longer effective (YYYY-MM-DD format). '1900-01-01' is used to represent effectively null/active records."
        data_type: date
        quote: true

  - name: seed_texarkana_gauge_adders
    description: "Texarkana gauge-based pricing adders for aluminum products. Contains pricing adjustments based on gauge ranges and aluminum types for the Texarkana facility."
    columns:
      - name: gauge_min
        description: "Minimum gauge in inches for this pricing tier."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: gauge_max
        description: "Maximum gauge in inches for this pricing tier."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: alum_type
        description: "Aluminum alloy type (e.g., 3003, 5052, 3003_tread)."
        data_type: string
        quote: true
        tests:
          - not_null
      - name: amount
        description: "Pricing adder amount for this gauge range and aluminum type."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: effective_start_date
        description: "The date when this pricing becomes effective (YYYY-MM-DD format)."
        data_type: date
        quote: true
        tests:
          - not_null
      - name: effective_end_date
        description: "The date when this pricing is no longer effective (YYYY-MM-DD format). '1900-01-01' is used to represent effectively null/active records."
        data_type: date
        quote: true

  - name: seed_galvannealed_cost
    description: "Galvannealed steel cost data by location. Contains cost information for galvannealed steel products from different suppliers."
    columns:
      - name: location
        description: "Supplier or location name."
        data_type: string
        quote: true
        tests:
          - not_null
      - name: cost
        description: "Cost amount for galvannealed steel."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: effective_start_timestamp
        description: "The timestamp when this cost becomes effective (ISO 8601 format)."
        data_type: datetime
        quote: true
        tests:
          - not_null
      - name: effective_end_timestamp
        description: "The timestamp when this cost is no longer effective (ISO 8601 format). '1900-01-01' is used to represent effectively null/active records."
        data_type: datetime
        quote: true

  - name: seed_steel_freight_adders
    description: "Steel freight pricing adders by location. Contains freight cost adjustments for steel products from different suppliers."
    columns:
      - name: location
        description: "Supplier or location name."
        data_type: string
        quote: true
        tests:
          - not_null
      - name: amount
        description: "Freight adder amount."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: effective_start_date
        description: "The date when this pricing becomes effective (YYYY-MM-DD format)."
        data_type: date
        quote: true
        tests:
          - not_null
      - name: effective_end_date
        description: "The date when this pricing is no longer effective (YYYY-MM-DD format). '1900-01-01' is used to represent effectively null/active records."
        data_type: date
        quote: true

  - name: seed_steel_coatings
    description: "Steel coating pricing data by gauge, width, steel type, and location. Contains pricing adjustments for different steel coatings and specifications."
    columns:
      - name: gauge
        description: "Gauge thickness in inches."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: width
        description: "Width in inches."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: steel_type
        description: "Type of steel coating (e.g., galvanized, galvanneal)."
        data_type: string
        quote: true
        tests:
          - not_null
      - name: location
        description: "Supplier or location name."
        data_type: string
        quote: true
        tests:
          - not_null
      - name: amount
        description: "Pricing amount for this specification."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: effective_start_date
        description: "The date when this pricing becomes effective (YYYY-MM-DD format)."
        data_type: date
        quote: true
        tests:
          - not_null
      - name: effective_end_date
        description: "The date when this pricing is no longer effective (YYYY-MM-DD format). '1900-01-01' is used to represent effectively null/active records."
        data_type: date
        quote: true

  - name: seed_steel_gauge_adders
    description: "Steel gauge-based pricing adders by gauge, width, steel type, and location. Contains pricing adjustments for different steel gauges and specifications."
    columns:
      - name: gauge
        description: "Gauge thickness in inches."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: width
        description: "Width in inches."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: steel_type
        description: "Type of steel (e.g., cold_rolled, galvanized)."
        data_type: string
        quote: true
        tests:
          - not_null
      - name: location
        description: "Supplier or location name."
        data_type: string
        quote: true
        tests:
          - not_null
      - name: amount
        description: "Pricing adder amount for this specification."
        data_type: numeric
        quote: true
        tests:
          - not_null
      - name: effective_start_date
        description: "The date when this pricing becomes effective (YYYY-MM-DD format)."
        data_type: date
        quote: true
        tests:
          - not_null
      - name: effective_end_date
        description: "The date when this pricing is no longer effective (YYYY-MM-DD format). '1900-01-01' is used to represent effectively null/active records."
        data_type: date
        quote: true