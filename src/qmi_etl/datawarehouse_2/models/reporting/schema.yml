  - name: daily_dashboard
    description: |
      Daily dashboard model that provides comprehensive daily sales and profitability metrics for business 
      intelligence and reporting. This model combines invoice and shipment data to create a unified view 
      of daily performance with conditional logic to show the most relevant metrics based on data availability.
      
      The model calculates key daily metrics including:
      - Daily sales amounts (invoice vs shipment based on date)
      - Daily costs (actual vs estimated based on date)
      - Daily weight sold
      - Gross margin calculations
      - Gross margin percentage
      
      Business Logic:
      - For dates before current date: Uses invoice data (actual amounts)
      - For current and future dates: Uses shipment data (estimated amounts)
      - Gross margin = amount_sold - cost
      - Gross margin percentage = (gross_margin / amount_sold) * 100
      
      This model is essential for daily business monitoring, executive dashboards, and trend analysis.
    columns:
      - name: full_date
        description: The date for which the metrics are calculated.
        data_type: date
        quote: true
      - name: amount_sold
        description: Daily sales amount. Uses invoice_amount for past dates and shipment_amount for current/future dates.
        data_type: numeric
        quote: true
      - name: Cost
        description: Daily cost amount. Uses actual_cost for past dates and estimated_cost for current/future dates.
        data_type: numeric
        quote: true
      - name: weight_sold
        description: Daily weight sold. Uses invoiced_weight for past dates and shipped_weight for current/future dates.
        data_type: numeric
        quote: true
      - name: invoice_weight_sold
        description: Daily invoice weight sold. Uses invoice_weight for past dates and invoice_weight for current/future dates.
        data_type: numeric
        quote: true
      - name: gross_margin
        description: Daily gross margin calculated as amount_sold - Cost.
        data_type: numeric
        quote: true
      - name: gross_margin_percent
        description: Daily gross margin percentage calculated as (gross_margin / amount_sold) * 100. Returns 0 if amount_sold is 0.
        data_type: numeric
        quote: true

  - name: inventory_history_error_report
    description: |
      Inventory history error report model that identifies pricing discrepancies between PR (Purchase Receipt) 
      and RA (Receiving Adjustment) transactions for inventory items. This model analyzes inventory history 
      to find cases where the oldest PR transaction price differs from the latest RA transaction price by 
      more than 5%, helping identify potential pricing errors or inconsistencies in inventory management.
      
      The model uses CTEs to:
      - Rank PR transactions by submit_date_time (oldest first) with history_id tiebreaker
      - Rank RA transactions by submit_date_time (newest first) with history_id tiebreaker
      - Map inventory_id to first_inventory_id with fallback logic
      - Join transactions using intelligent logic for direct vs parent relationships
      
      Business Logic:
      - PR transactions: Selects oldest transaction for each first_inventory_id
      - RA transactions: Selects newest transaction for each first_inventory_id
      - Price difference threshold: 5% variance between PR and RA prices
      - Fallback: Uses inventory_id when first_inventory_id is blank
      - Direct join: When first_inventory_id equals inventory_id, joins directly on inventory_id
      
      This model is essential for inventory audit processes, pricing validation, and identifying 
      data quality issues in the inventory management system.
    columns:
      - name: inventory_id
        description: Unique identifier for the inventory item being analyzed.
        data_type: int64
        quote: true
      - name: first_inventory_id
        description: The first inventory ID that groups related inventory transactions. Falls back to inventory_id if blank.
        data_type: int64
        quote: true
      - name: pr_price
        description: Price from the oldest PR (Purchase Receipt) transaction, rounded to 2 decimal places.
        data_type: numeric
        quote: true
      - name: ra_price
        description: Price from the latest RA (Receiving Adjustment) transaction, rounded to 2 decimal places.
        data_type: numeric
        quote: true
      - name: receiving_date
        description: Date when the inventory item was received into the system.
        data_type: date
        quote: true
      - name: pr_submit_date_time
        description: Timestamp of the oldest PR transaction used for price comparison.
        data_type: timestamp
        quote: true
      - name: ra_submit_date_time
        description: Timestamp of the latest RA transaction used for price comparison.
        data_type: timestamp
        quote: true

  - name: purchase_orders
    description: |
      Comprehensive purchase orders reporting model that combines PO header and line data
      with item master information for reporting and analysis.
      
      Key Features:
      - Combines purchase order header and line data from staging
      - Joins with item master for material type and specifications
      - Includes vendor information
      - Provides delivery tracking with due_date (ship from vendor) and promise_date (arrival)
      - Calculates transit time and days until arrival
      - Includes open_amount from base_rw_po for tracking outstanding PO amounts
      - is_open_po flag based on open_amount > 0
      
      Data Sources:
      - stg_po: Base purchase order data from staging (includes open_amount from base_rw_po)
      - stg_item_master: Item master data for material specifications
      - inventory: In-transit inventory data, aggregated by po_number and item_id_width, used to calculate open_weight_not_in_transit
    columns:
      # Primary keys
      - name: po_head_id
        description: Unique identifier for the purchase order header.
        data_type: int64
      - name: po_line_id
        description: Unique identifier for the purchase order line.
        data_type: int64

      # Foreign keys
      - name: item_id
        description: Foreign key to the item master.
        data_type: int64
      - name: customer_id
        description: Foreign key to the customer associated with the purchase order line.
        data_type: int64
      - name: vendor_id
        description: Foreign key to the vendor.
        data_type: int64
      - name: vendor_part_number_id
        description: Foreign key to the vendor part number.
        data_type: int64
      - name: item_id_width
        description: Composite key combining item_id and width for joining with item master.
        data_type: string

      # PO info
      - name: po_number
        description: Purchase order number.
        data_type: string
      - name: rfq_number
        description: Request for quote number.
        data_type: string
      - name: reference
        description: Reference information for the purchase order.
        data_type: string
      - name: reference_buyer_name
        description: Buyer name parsed from the reference field, normalized to "First Last" format.
        data_type: string
      - name: buyer
        description: Name of the buyer for the purchase order.
        data_type: string
      - name: terms
        description: Payment terms description.
        data_type: string
      - name: ship
        description: Shipping method or carrier.
        data_type: string
      - name: country_code
        description: Country code for the purchase order.
        data_type: string
      - name: vendor_name
        description: Name of the vendor.
        data_type: string

      # Item info from item master
      - name: item_name
        description: Name of the item from item master.
        data_type: string
      - name: item_description
        description: Description of the item from item master.
        data_type: string
      - name: material_type
        description: Material type classification (Steel, Aluminum, Copper, Other).
        data_type: string
      - name: type_description
        description: Type description from item master.
        data_type: string
      - name: item_grade
        description: Grade of the item from item master.
        data_type: string
      - name: item_gauge
        description: Gauge of the item extracted from product code.
        data_type: string

      # Item descriptive attributes from PO
      - name: description
        description: Description of the item on the purchase order line.
        data_type: string
      - name: unit_of_measure
        description: Unit of measure for the item.
        data_type: string
      - name: mill
        description: Mill or manufacturer of the material.
        data_type: string
      - name: chemistry
        description: Chemical composition or grade of the material.
        data_type: string
      - name: country_of_melt_and_pour
        description: Country where the material was melted and poured.
        data_type: string
      - name: importer_of_record
        description: Name of the importer of record for the material.
        data_type: string
      - name: vendor_tag_num
        description: Vendor's tag or reference number for the material.
        data_type: string

      # Dimensions
      - name: thickness
        description: Thickness of the material.
        data_type: numeric
      - name: gauge_min
        description: Minimum gauge specification for the material.
        data_type: numeric
      - name: gauge_max
        description: Maximum gauge specification for the material.
        data_type: numeric
      - name: width
        description: Width of the material.
        data_type: numeric
      - name: width_1
        description: Secondary width specification.
        data_type: numeric
      - name: length
        description: Length of the material.
        data_type: numeric
      - name: length_1
        description: Secondary length specification.
        data_type: numeric
      - name: feet
        description: Total feet of material on the purchase order line.
        data_type: numeric

      # Quantities
      - name: pieces
        description: Number of pieces on the purchase order line.
        data_type: int64
      - name: weight
        description: Total weight of the material.
        data_type: numeric

      # Pricing and freight
      - name: price
        description: Unit price for the material.
        data_type: numeric
      - name: amount
        description: Total dollar amount for the purchase order line.
        data_type: numeric
      - name: open_weight
        description: Open weight remaining on the purchase order line.
        data_type: numeric
      - name: open_amount
        description: Open dollar amount remaining on the purchase order line. Sourced from base_rw_po.
        data_type: numeric
      - name: frt_amt
        description: Freight amount for the purchase order line.
        data_type: numeric
      - name: frt_cwt
        description: Freight cost per hundredweight (CWT).
        data_type: numeric
      - name: flat_frt_amt
        description: Flat freight amount for the purchase order.
        data_type: numeric
      - name: open_weight_not_in_transit
        description: Open weight minus the total in-transit inventory weight for the same PO number and item (item_id_width). Represents the portion of open weight not yet in transit.
        data_type: numeric

      # Dates
      - name: po_date
        description: Date the purchase order was created.
        data_type: date
      - name: due_date
        description: The date the material is expected to ship from the vendor.
        data_type: date
      - name: promise_date
        description: The date the material is expected to arrive at the warehouse.
        data_type: date
      - name: transit_days
        description: Number of days between ship date (due_date) and arrival date (promise_date).
        data_type: int64
      - name: days_until_arrival
        description: Number of days from today until expected arrival (promise_date).
        data_type: int64

      # Flags
      - name: is_open_po
        description: Flag indicating if the purchase order line is open (has open_amount > 0).
        data_type: boolean
      - name: paperwrap
        description: Flag indicating if paper wrap is required.
        data_type: boolean
      - name: spacers
        description: Flag indicating if spacers are required.
        data_type: boolean
      - name: received
        description: Flag indicating if the material has been received.
        data_type: boolean
      - name: fork_lift
        description: Flag indicating if forklift unloading is required.
        data_type: boolean
      - name: rear_unload
        description: Flag indicating if rear unloading is required.
        data_type: boolean
      - name: side_unload
        description: Flag indicating if side unloading is required.
        data_type: boolean
      - name: hide_width_length
        description: Flag to hide width and length on documentation.
        data_type: boolean
      - name: flaws_00
        description: Flag indicating flaws or quality issues.
        data_type: boolean

      # Comments
      - name: po_comment
        description: General comments for the purchase order.
        data_type: string
      - name: line_comment
        description: General comments for the purchase order line.
        data_type: string
      - name: line_comment_np
        description: Non-printable comments for internal use.
        data_type: string
      - name: line_comment_sales
        description: Sales-related comments for the purchase order line.
        data_type: string
      - name: line_comment_receiving
        description: Receiving-related comments for the purchase order line.
        data_type: string
      - name: line_misc_info
        description: Miscellaneous information for the purchase order line.
        data_type: string

  - name: supplies_po
    description: |
      Reporting model for supplies purchase orders. Pass-through of stg_supplies_po providing supplies PO data
      with vendor linkage, total price, and estimated due date for reporting and analytics.
    columns:
      - name: supplies_po_line_id
        description: Unique identifier for the supplies purchase order line.
      - name: po_number
        description: Purchase order number for the supplies order.
      - name: part_number
        description: Part number for the supply item.
      - name: vendor_part_number
        description: Vendor's part number for the supply item.
      - name: vendor_name
        description: Name of the vendor supplying the item.
      - name: vendor_description
        description: Vendor's description of the item.
      - name: description
        description: Description of the supply item.
      - name: order_qty
        description: Quantity ordered.
      - name: u_m
        description: Unit of measure for the order quantity.
      - name: pkg_qty
        description: Package quantity.
      - name: price
        description: Price per unit for the supply item.
      - name: inserted_at
        description: Timestamp when the record was inserted.
      - name: promise_date
        description: Promised delivery date from the vendor.
      - name: vendor_id
        description: Foreign key to the vendor.
      - name: total_price
        description: Extended price calculated as order_qty multiplied by price.
      - name: estimated_due_date
        description: Estimated due date calculated as inserted_at plus 30 days.