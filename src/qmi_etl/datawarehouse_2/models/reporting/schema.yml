  - name: daily_metal_base_price
    description: |
      Daily metal base pricing model that provides a unified view of metal pricing data for reporting and analytics.
      This model sources data from stg_metal_prices and serves as the primary interface for daily metal pricing
      information across the organization.
      
      The model combines CRU (Commodity Research Unit) and aluminum ingot pricing data with priority given to
      CRU data when both sources are available. It includes data source tracking for transparency and debugging.
    columns:
      - name: reporting_date
        description: The date for which the metal pricing data is reported. This is the primary date dimension used for analysis and reporting.
        data_type: date
        tests:
          - not_null
        quote: true
      
      - name: cost_amount
        description: |
          The cost amount per pound for the metal. This field uses priority logic:
          1. Uses CRU price_value_per_pound if available
          2. Falls back to aluminum ingot midwest_price if CRU data is null
          3. Returns null if both sources are unavailable
        data_type: numeric
        quote: true
      
      - name: metal_sub_type
        description: |
          The type or description of the metal. This field uses priority logic:
          1. Uses CRU metal_sub_type if available
          2. Falls back to aluminum ingot type_description if CRU data is null
          3. Returns null if both sources are unavailable
        data_type: string
        quote: true
      
      - name: data_source
        description: |
          Indicates the source of the pricing data for debugging and data lineage purposes.
          Values: 'CRU' (Commodity Research Unit), 'Aluminum Ingot', or 'No Data' when both sources are null.
        data_type: string
        quote: true

