  - name: monthly_customer_metrics
    description: |
      Comprehensive monthly customer metrics and analytics model that tracks customer lifecycle, 
      acquisition, retention, and churn patterns. This model provides detailed insights into 
      customer behavior and business growth trends on a monthly basis.
      
      The model identifies three key customer segments:
      - Active customers: Customers who placed orders in the given month
      - New customers: Customers whose first order was in the given month
      - Churned customers: Customers whose last order was 12+ months ago (identified in the month they churn)
      
      Key metrics include retention rates, churn rates, net customer growth, and cumulative totals
      for strategic business analysis and customer lifecycle management.
    columns:
      - name: year_number
        description: The year number for the reporting month (e.g., 2024).
        data_type: int64
        quote: true
      - name: month_number
        description: The month number for the reporting month (1-12).
        data_type: int64
        quote: true
      - name: year_month_date
        description: The first day of the reporting month in date format (YYYY-MM-01).
        data_type: date
        quote: true
      - name: month_end_date
        description: The last day of the reporting month in date format (e.g., 2024-01-31 for January).
        data_type: date
        quote: true
      - name: active_customers
        description: Number of unique customers who placed at least one order in this month.
        data_type: int64
        quote: true
      - name: new_customers
        description: Number of customers whose first order was placed in this month (new customer acquisition).
        data_type: int64
        quote: true
      - name: churned_customers
        description: Number of customers whose last order was 12+ months ago, identified as churned in this month.
        data_type: int64
        quote: true
      - name: retention_rate_percent
        description: Percentage of customers from the previous month who remained active this month. Calculated as (active_customers / previous_month_active_customers) * 100.
        data_type: numeric
        quote: true
      - name: churn_rate_percent
        description: Percentage of customers from the previous month who churned this month. Calculated as (churned_customers / previous_month_active_customers) * 100.
        data_type: numeric
        quote: true
      - name: net_customer_growth
        description: Net change in customer base this month (new_customers - churned_customers).
        data_type: int64
        quote: true
      - name: cumulative_new_customers
        description: Running total of all new customers acquired since the beginning of the data.
        data_type: int64
        quote: true
      - name: cumulative_churned_customers
        description: Running total of all customers who have churned since the beginning of the data.
        data_type: int64
        quote: true
      - name: repeat_customers
        description: Number of customers who placed multiple orders in this month.
        data_type: int64
        quote: true
      - name: total_orders
        description: Total number of orders placed by all customers in this month.
        data_type: int64
        quote: true
      - name: total_revenue
        description: Total revenue generated from all orders in this month (based on invoice_amount).
        data_type: numeric
        quote: true
      - name: total_ordered_weight
        description: Total weight of all orders in this month. This column was refactored from 'total_weight' to 'total_ordered_weight' for clarity.
        data_type: numeric
        quote: true
      - name: total_invoice_weight
        description: Total weight of all invoices in this month. This may differ from order weight due to adjustments or actual measurements.
        data_type: numeric
        quote: true
      - name: repeat_purchase_rate_percent
        description: Percentage of active customers who placed multiple orders this month. Calculated as (repeat_customers / active_customers) * 100.
        data_type: numeric
        quote: true
      - name: average_order_frequency
        description: Average number of orders per active customer in this month. Calculated as total_orders / active_customers.
        data_type: numeric
        quote: true
      - name: average_revenue_per_customer
        description: Average revenue generated per active customer in this month. Calculated as total_revenue / active_customers.
        data_type: numeric
        quote: true
      - name: average_weight_per_customer
        description: Average weight ordered per active customer in this month. Calculated as total_ordered_weight / active_customers.
        data_type: numeric
        quote: true
      - name: average_invoice_weight_per_customer
        description: Average invoice weight per active customer in this month. Calculated as total_invoice_weight / active_customers.
        data_type: numeric
        quote: true
      - name: customer_retention_rate_percent
        description: Percentage of customers from the previous month who remained active this month. Calculated as ((active_customers - new_customers) / previous_month_active_customers) * 100. This is different from retention_rate_percent which measures overall retention.
        data_type: numeric
        quote: true

