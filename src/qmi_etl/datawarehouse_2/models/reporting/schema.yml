models:
  - name: production_order_line
    description: |
      The production_order_line model in the reporting layer provides a comprehensive view of production order lines. 
      It is a direct projection of the stg_production_order_line model, which combines data from multiple sources 
      including base_production_orders_finished_goods, base_production_order_performance, base_production_orders_history, 
      and base_production_order_header. It contains detailed information about each production order line, 
      including finished goods details, performance metrics, history, and header information.
      
      **Data Source Dependencies:**
      This model sources data from `stg_production_order_line`.
      
      **Timestamp Logic:**
      The model includes three timestamp fields:
      - `modified_timestamp`: From the production order header, indicating when the order was last modified
      - `most_recent_transaction_timestamp`: The most recent transaction timestamp from the production order history
      - `most_recent_timestamp`: A calculated field that prioritizes transaction_timestamp, falling back to modified_timestamp only when transaction_timestamp is null
    columns:
      - name: production_order_line_id
        description: Unique identifier for each production order line. This is a primary key in the model.
        data_type: int64
        quote: true
      - name: production_order_finished_id
        description: Unique identifier for the finished production order.
        data_type: int64
        quote: true
      - name: order_id
        description: Unique identifier for the order associated with the production order line.
        data_type: int64
        quote: true
      - name: finished_inventory_id
        description: The unique identifier for the finished inventory item in the production order.
        data_type: int64
        quote: true
      - name: order_line_id
        description: The unique identifier for the order line associated with the production order line.
        data_type: int64
        quote: true
      - name: warehouse_id
        description: The unique identifier for the warehouse where the production order is being processed.
        data_type: int64
        quote: true
      - name: tag_id
        description: Unique identifier for the inventory tag associated with the production order.
        data_type: string
        quote: true
      - name: item_id
        description: Unique identifier for the item associated with the production order.
        data_type: int64
        quote: true
      - name: parent_inventory_id
        description: Unique identifier for the parent inventory item.
        data_type: int64
        quote: true
      - name: finished_material_comments
        description: Comments associated with the finished material.
        data_type: string
        quote: true
      - name: created_username
        description: The username of the user who created the production order.
        data_type: string
        quote: true
      - name: modified_username
        description: The username of the user who last modified the production order.
        data_type: string
        quote: true
      - name: production_line_comments
        description: Comments associated with the production line.
        data_type: string
        quote: true
      - name: warehouse_name
        description: The name of the warehouse where the production order is processed.
        data_type: string
        quote: true
      - name: line_produced_by
        description: The username of the user who performed the most recent production transaction. This field comes from the most recent production history record. This means it will only show production as the user, not modified from costing.
        data_type: string
        quote: true
      - name: machine
        description: The machine used for the production order. This field comes from the most recent production history record.
        data_type: string
        quote: true
      - name: production_order_number
        description: The production order number associated with the production order line. This is sourced from the production order header.
        data_type: string
        quote: true
      - name: has_sales_order
        description: Boolean flag indicating if the finished good is associated with a sales order.
        data_type: boolean
        quote: true
      - name: is_rewrap
        description: Boolean flag indicating if the finished good is a rewrap.
        data_type: boolean
        quote: true
      - name: is_parent
        description: Boolean flag indicating if the inventory item is a parent item.
        data_type: boolean
        quote: true
      - name: finished_length
        description: The length of the finished goods produced.
        data_type: numeric
        quote: true
      - name: finished_width
        description: The width of the finished goods produced.
        data_type: numeric
        quote: true
      - name: finished_feet
        description: The total feet of the finished goods.
        data_type: numeric
        quote: true
      - name: finished_weight
        description: The total weight of the finished goods produced.
        data_type: numeric
        quote: true
      - name: wip_weight
        description: The weight of the work in progress (WIP).
        data_type: numeric
        quote: true
      - name: finished_pieces
        description: The number of pieces of finished goods produced.
        data_type: int64
        quote: true
      - name: wip_pieces
        description: The number of pieces of work in progress (WIP).
        data_type: int64
        quote: true
      - name: finished_machine_minutes
        description: The total machine minutes spent on the production of the finished goods.
        data_type: int64
        quote: true
      - name: modified_timestamp
        description: The timestamp when the production order was last modified in the header table.
        data_type: timestamp
        quote: true
      - name: most_recent_transaction_timestamp
        description: The timestamp of the most recent transaction from the production order history. This is derived by selecting the transaction with the latest transaction_timestamp for each production_order_line_id. Note that this field uses the most recent production history record.
        data_type: timestamp
        quote: true
      - name: most_recent_timestamp
        description: |
          A calculated field that prioritizes transaction_timestamp over modified_timestamp. Returns most_recent_transaction_timestamp unless it is null, in which case it returns modified_timestamp.
        data_type: timestamp
        quote: true
  - name: customer
    description: The 'customer' model is the reporting table for customer infromation,
    columns:
      - name: customer_id
        description: Unique identifier for each customer. This is a primary key.
        data_type: int64
        tests:
          - not_null
          - unique
        quote: true
      - name: route_id
        description: Unique identifier for the route associated with the customer. This is a foreign key that links to the route table.
        data_type: int64
        quote: true
      - name: tax_code
        description: This is the tax code attached to the user .
        data_type: int64
        quote: true
      - name: address_id
        description: The unique identifier for the customer's address. This is a foreign key that links to the address table.
        data_type: int64
        quote: true
      - name: exempt_reason_code
        description: The code that represents the reason for a customer's tax exemption. This code corresponds to a specific reason in the tax exemption reason table.
        data_type: int64
        quote: true
      - name: tax_id
        description: The unique identifier for the customer's tax information.
        data_type: int64
        quote: true
      - name: balance
        description: The current balance of the customer's account. This is a numeric value that can be positive (indicating the customer owes money) or negative (indicating the customer has a credit).
        data_type: numeric
        quote: true
      - name: customer_fax
        description: The fax number for the customer. This is a string value that should follow the standard format for phone numbers.
        data_type: string
        quote: true
      - name: customer_name
        description: The full name of the customer. This is a string value that should include both the customer's first and last name.
        data_type: string
        quote: true
      - name: customer_phone
        description: The phone number of the customer. It is stored as a string and may contain special characters like hyphens or parentheses.
        data_type: string
        quote: true
      - name: customer_email
        description: The email address of the customer. It is stored as a string and follows the standard email format (example@example.com).
        data_type: string
        quote: true
      - name: customer_website
        description: The website URL of the customer. It is stored as a string and follows the standard URL format (http://www.example.com).
        data_type: string
        quote: true
      - name: customer_comments
        description: This field contains any comments or notes related to the customer. This can include general observations, specific details about customer preferences, or other relevant information.
        data_type: string
        quote: true
      - name: fax_invoice
        description: This field indicates whether the customer prefers to receive invoices via fax. The value is typically 'yes' or 'no', but may also be null if the preference is unknown.
        data_type: string
        quote: true
      - name: email_invoice
        description: This field indicates whether the customer prefers to receive invoices via email. The value is typically 'yes' or 'no', but may also be null if the preference is unknown.
        data_type: string
        quote: true
      - name: credit_limit
        description: The maximum amount that a customer is allowed to owe the company at any given time. This is a numeric field.
        data_type: numeric
        quote: true
      - name: customer_code
        description: A unique identifier assigned to each customer. This is a string field.
        data_type: string
        quote: true
      - name: salesperson_1
        description: This is the inside saleperson
        data_type: int64
        quote: true
      - name: salesperson_2
        description: This is the outside sales person
        data_type: int64
        quote: true
      - name: sales_comments
        description: This field contains any comments or notes related to the sales process for the customer. It is a string value.
        data_type: string
        quote: true
      - name: customer_create_date
        description: This field represents the date when the customer was created in the system. It is a date value.
        data_type: date
        quote: true
      - name: has_statements
        description: A boolean field indicating whether the customer has statements or not. True means the customer has statements, False means the customer does not have statements.
        data_type: boolean
        quote: true
      - name: total_tax_rate
        description: A numeric field representing the total tax rate applicable to the customer. This is calculated based on the customer's location and tax code.
        data_type: numeric
        quote: true
      - name: tax_description
        description: A string field providing a description of the tax applicable to the customer. This is derived from the tax code associated with the customer.
        data_type: string
        quote: true
      - name: country
        description: The country where the customer is located. This is a string field.
        data_type: string
        quote: true
      - name: state
        description: The state where the customer is located. This is a string field.
        data_type: string
        quote: true
      - name: city
        description: The city where the customer is located. This is a string field.
        data_type: string
        quote: true
      - name: zip_code
        description: The zip code of the customer's address. This is a string field that can contain alphanumeric characters.
        data_type: string
        quote: true
      - name: address_line_1
        description: The first line of the customer's address. This is a string field that typically contains the street name and number.
        data_type: string
        quote: true
      - name: address_line_2
        description: The second line of the customer's address. This is an optional string field that typically contains additional address information such as apartment or suite number.
        data_type: string
        quote: true
      - name: is_taxable
        description: A boolean field indicating whether the customer is taxable or not. If true, the customer is subject to tax. If false, the customer is not subject to tax.
        data_type: boolean
        quote: true
      - name: tax_exemption_reason
        description: A string field that provides the reason for a customer's tax exemption, if applicable. This field is typically populated only for customers where 'is_taxable' is false.
        data_type: string
        quote: true
      - name: discount_days
        description: Number of days within which a discount is available for payment terms.
      - name: due_days
        description: Number of days until the payment is due for payment terms.
      - name: discount_percent
        description: Discount percentage available if paid within the discount days for payment terms.
      - name: terms_name
        description: Name or description of the payment terms.
  - name: cycle_count_scans
    description: The cycle_count_scans model is a representation of the cycle count scans data. It includes information about each scan such as the scan id, inventory tag, text response, timestamps of when the scan was made and received, the type of capture, the username of the person who made the scan, the device name used for the scan, and the location where the scan was made. The data is sourced from the `quality-metals-prod`.`dbt_dbenzaquen1_stg`.`stg_cycle_count_scans` table.
    columns:
      - name: scan_id
        description: Unique identifier for each scan in the cycle count process.
        data_type: int64
        quote: true
      - name: inventory_tag
        description: Tag associated with each inventory item scanned during the cycle count process.
        data_type: int64
        quote: true
      - name: text_response
        description: Textual response or feedback provided by the scanner during the cycle count process.
        data_type: string
        quote: true
      - name: scanned_timestamp
        description: The timestamp when the cycle count scan was performed. This is typically captured by the scanning device and is in UTC.
        data_type: timestamp
        quote: true
      - name: received_timestamp
        description: The timestamp when the cycle count scan data was received and recorded into the system. This is typically captured by the system receiving the scan data and is in UTC.
        data_type: timestamp
        quote: true
      - name: capture_type
        description: The type of capture method used for the cycle count scan. This could be manual entry, barcode scan, RFID, etc.
        data_type: string
        quote: true
      - name: username
        description: The username of the individual who performed the cycle count scan.
        data_type: string
        quote: true
      - name: device_name
        description: The name of the device used to perform the cycle count scan.
        data_type: string
        quote: true
      - name: location
        description: The location where the cycle count scan was performed.
        data_type: string
        quote: true
  - name: daily_sales_targets
    description: The daily_sales_targets is the daily sales targets.
    columns:
      - name: Date_value
        description: The date for which the sales target is set. It is in the format YYYY-MM-DD.
        data_type: date
        quote: true
      - name: Daily_Target
        description: The sales target set for the specific date. It is a numeric value representing the sales goal.
        data_type: float64
        quote: true
  - name: date_dim
    description: The 'date_dim' model is a date dimension table that provides a range of date-related attributes for each day from January 1, 2020 to January 1, 2050. These attributes include the full date, year, week of the year, day of the year, fiscal year, fiscal quarter, month, month name, weekday number, day name, a boolean indicating if the day is a weekday, the date of the end of the week, and the date of the end of the month.
    columns:
      - name: id
        description: The id column is a string representation of the full_date column, formatted as YYYY-MM-DD.
        data_type: string
        quote: true
      - name: full_date
        description: The full_date column is a date type column that represents the full date for each record in the format YYYY-MM-DD.
        data_type: date
        quote: true
      - name: year
        description: The year column is an integer type column that represents the year extracted from the full_date column.
        data_type: int64
        quote: true
      - name: year_week
        description: The 'year_week' column represents the week number of the year for the given date. It is extracted from the full date using the EXTRACT function in SQL.
        data_type: int64
        quote: true
      - name: year_day
        description: The 'year_day' column represents the day of the year for the given date. It is extracted from the full date using the EXTRACT function in SQL.
        data_type: int64
        quote: true
      - name: fiscal_year
        description: The 'fiscal_year' column represents the fiscal year for the given date. It is extracted from the full date using the EXTRACT function in SQL. The fiscal year may differ from the calendar year depending on the organization's financial year start and end dates.
        data_type: int64
        quote: true
      - name: fiscal_qtr
        description: This column represents the fiscal quarter of the year for the given date. It is formatted as 'Q1', 'Q2', 'Q3', or 'Q4'.
        data_type: string
        quote: true
      - name: month
        description: This column represents the month of the year for the given date. It is represented as an integer from 1 (January) to 12 (December).
        data_type: int64
        quote: true
      - name: month_name
        description: This column represents the name of the month for the given date. It is represented as a string, such as 'January', 'February', etc.
        data_type: string
        quote: true
      - name: week_day
        description: This column represents the day of the week in numerical format, where 0 represents Sunday and 6 represents Saturday.
        data_type: string
        quote: true
      - name: day_name
        description: This column represents the full name of the day of the week, such as 'Sunday', 'Monday', etc.
        data_type: string
        quote: true
      - name: day_is_weekday
        description: This column is a binary indicator of whether the day is a weekday or not. It is represented as 1 if the day is a weekday (Monday to Friday) and 0 if the day is a weekend (Saturday or Sunday).
        data_type: int64
        quote: true
      - name: end_of_week
        description: This column represents the end date of the week for the given date. It is calculated by adding the number of days remaining in the week to the current date.
        data_type: date
        quote: true
      - name: end_of_month
        description: This column represents the end date of the month for the given date. It is calculated by adding one month to the current date and then subtracting the day of the month.
        data_type: date
        quote: true
  - name: inventory_locations
    description: The 'inventory_locations'  is this the  dimention for physical locations in inventory
    columns:
      - name: location_id
        description: The unique identifier for each inventory location. This is a primary key.
        data_type: int64
        tests:
          - not_null
          - unique
        quote: true
      - name: location_name
        description: The name of the inventory location. This is a descriptive field that provides more context about the location.
        data_type: string
        quote: true
      - name: Warehouse
        description: The warehouse where the inventory location is situated. This field helps in identifying the physical location of the inventory.
        data_type: string
        quote: true
      - name: reserve_priority
        description: This column indicates the priority of the inventory in the reserve. A lower value indicates a higher priority.
        data_type: int64
        quote: true
      - name: is_excess
        description: This column indicates whether the inventory is in excess. A value of 'true' means the inventory is in excess, and 'false' means it is not.
        data_type: boolean
        quote: true
      - name: is_inactive
        description: This column indicates whether the inventory is inactive. A value of 'true' means the inventory is inactive, and 'false' means it is active.
        data_type: boolean
        quote: true
  - name: inventory_snapshot
    description: The inventory_snapshot model is a comprehensive snapshot of the inventory data. It includes details about the inventory items such as their id, tag id, warehouse id, vendor id, gauge id, purchase order number and line, item id, location id, parent inventory id, and various measurements like piw, feet, length, pieces, weight, freight, quantity, quantity on order, feet on order, weight on order, cost, and status code. It also includes item number, mic measurements, width, thickness, difference in nominal mic, receiving date, snapshot timestamp and date, status description, flags for whether the item is in inventory, location name, warehouse name, flags for excess, inactivity, whether it came from a completed order, whether it has an attached invoice, whether it's a child or parent item, days in inventory, and inventory aging bucket. The data is sourced from the `quality-metals-prod.dbt_dbenzaquen1_stg.stg_inventory_snapshot` table.
    columns:
      - name: inventory_id
        description: The unique identifier for each inventory item. This is an integer value that is automatically generated and incremented for each new inventory item.
        data_type: int64
        tests:
          - unique
          - not_null
        quote: true
      - name: tag_id
        description: The unique identifier for each tag associated with an inventory item.
        data_type: string
        quote: true
      - name: warehouse_id
        description: The unique identifier for each warehouse where inventory items are stored. This is an integer value that is automatically generated and incremented for each new warehouse.
        data_type: int64
        quote: true
      - name: vendor_id
        description: An integer identifier for the vendor associated with the inventory item.
        data_type: int64
        quote: true
      - name: gauge_id
        description: An integer identifier for the gauge of the inventory item. The gauge refers to the thickness of the metal.
        data_type: int64
        quote: true
      - name: po_number
        description: A string identifier for the purchase order associated with the inventory item.
        data_type: string
        quote: true
      - name: po_line
        description: The 'po_line' column represents the line number of the purchase order. It is an integer value that helps in identifying the specific line item in a purchase order.
        data_type: int64
        quote: true
      - name: item_id
        description: The 'item_id' column is a unique identifier for each item in the inventory. It is an integer value that helps in tracking and managing individual items in the inventory system.
        data_type: int64
        quote: true
      - name: location_id
        description: The 'location_id' column represents the unique identifier for the location where the inventory item is stored. It is an integer value that helps in tracking the exact location of an item in the warehouse.
        data_type: int64
        quote: true
      - name: parent_inventory_id
        description: The unique identifier of the parent inventory. This is used to link child inventories to their parent inventory. If an inventory item does not have a parent, this field will be null.
        data_type: int64
        quote: true
      - name: piw
        description: The 'Pounds per Inch Width' (PIW) of the inventory item. This is a measure of the weight of the item per inch of its width.
        data_type: numeric
        quote: true
      - name: feet
        description: The length of the inventory item in feet. This is used to calculate the total weight of the item.
        data_type: numeric
        quote: true
      - name: length
        description: The length of the inventory item. This is a numeric value that represents the length of the item in the inventory. It is measured in the standard unit of length.
        data_type: numeric
        quote: true
      - name: pieces
        description: The number of pieces of the inventory item. This is an integer value that represents the total number of pieces of the item in the inventory.
        data_type: int64
        quote: true
      - name: weight
        description: The weight of the inventory item. This is a numeric value that represents the weight of the item in the inventory. It is measured in the standard unit of weight.
        data_type: numeric
        quote: true
      - name: freight
        description: The freight cost associated with the inventory item. This is a numeric value that represents the cost of transporting the item from the vendor to the warehouse.
        data_type: numeric
        quote: true
      - name: Qty
        description: The quantity of the inventory item currently in stock. This is an integer value that represents the number of units of the item available in the inventory.
        data_type: int64
        quote: true
      - name: qty_on_order
        description: The quantity of the inventory item that is currently on order. This is an integer value that represents the number of units of the item that have been ordered but not yet received.
        data_type: int64
        quote: true
      - name: feet_on_order
        description: This column represents the total feet of inventory items that are currently on order. The data type is numeric.
        data_type: numeric
        quote: true
      - name: weight_on_order
        description: This column represents the total weight of inventory items that are currently on order. The data type is numeric.
        data_type: numeric
        quote: true
      - name: Cost
        description: This column represents the total cost of the inventory items. The data type is numeric.
        data_type: numeric
        quote: true
      - name: status_code
        description: The status_code column represents the current status of the inventory item. This is a string value that can have various codes representing different statuses.
        data_type: string
        quote: true
      - name: item_number
        description: The item_number column represents the unique identifier for each inventory item. This is a string value that is unique for each item in the inventory.
        data_type: string
        quote: true
      - name: mic_1
        description: The mic_1 column represents the first measurement of the inventory item's thickness in micrometers. This is a numeric value.
        data_type: numeric
        quote: true
      - name: mic_2
        description: The second measurement of the thickness of the metal in microns. This is used in quality control to ensure the metal is of the correct thickness.
        data_type: numeric
        quote: true
      - name: width
        description: The width of the inventory item in inches. This is a critical dimension for many applications of the metal.
        data_type: numeric
        quote: true
      - name: thickness
        description: The thickness of the inventory item in inches. This is a critical dimension for many applications of the metal.
        data_type: numeric
        quote: true
      - name: diffrence_nom_mic
        description: This column represents the numerical difference between the nominal and actual micrometer measurements of the inventory item. It is a numeric field and can be used to assess the quality and precision of the inventory items.
        data_type: numeric
        quote: true
      - name: receiving_date
        description: This column represents the date when the inventory item was received in the warehouse. It is a date field and can be used to track the timeline of inventory movement and management.
        data_type: date
        quote: true
      - name: snapshot_timestamp
        description: This column represents the exact timestamp when the snapshot of the inventory was taken. It is a datetime field and can be used to track the state of the inventory at any given point in time.
        data_type: datetime
        quote: true
      - name: snapshot_date
        description: The date when the snapshot of the inventory was taken. This is different from the timestamp, as it only contains the date information and not the time. The data type is date.
        data_type: date
        quote: true
      - name: status_description
        description: A string that describes the current status of the inventory item. This could include statuses like 'In Stock', 'Out of Stock', 'Discontinued', etc. The data type is string.
        data_type: string
        quote: true
      - name: is_in_inventory
        description: A boolean flag indicating whether the item is currently in inventory or not. If the value is true, the item is in inventory. If the value is false, the item is not in inventory. The data type is boolean.
        data_type: boolean
        quote: true
      - name: location_name
        description: The 'location_name' column represents the name of the location where the inventory item is stored. This is a string type field.
        data_type: string
        quote: true
      - name: Warehouse
        description: The 'Warehouse' column represents the name of the warehouse where the inventory item is stored. This is a string type field.
        data_type: string
        quote: true
      - name: is_excess
        description: The 'is_excess' column is a boolean field that indicates whether the inventory item is in excess. If the value is true, it means the item is in excess; if false, it means the item is not in excess.
        data_type: boolean
        quote: true
      - name: is_inactive
        description: A boolean field indicating whether the inventory item is inactive. If true, the item is not currently in use or circulation within the inventory system.
        data_type: boolean
        quote: true
      - name: in_from_completed_order
        description: A boolean field indicating whether the inventory item has been received from a completed order. If true, the item was added to the inventory as a result of an order completion.
        data_type: boolean
        quote: true
      - name: has_attached_invoice
        description: A boolean field indicating whether the inventory item has an attached invoice. If true, there is an invoice associated with the item in the inventory system.
        data_type: boolean
        quote: true
      - name: is_child
        description: A boolean field indicating whether the inventory item is a child item. Child items are typically part of a larger, parent item and are not standalone items in the inventory.
        data_type: boolean
        quote: true
      - name: is_parent
        description: A boolean field indicating whether the inventory item is a parent item. Parent items are typically larger items that can be broken down into smaller, child items.
        data_type: boolean
        quote: true
      - name: days_in_inventory
        description: An integer field representing the number of days the item has been in the inventory. This is calculated from the receiving date to the snapshot date.
        data_type: int64
        quote: true
      - name: inventory_aging_bucket
        description: This column represents the aging bucket of the inventory. It categorizes the inventory based on the number of days it has been in the inventory. This helps in understanding the age of the inventory and can be used for inventory management and optimization.
        data_type: string
        quote: true
  - name: inventory
    description: |
      The inventory model is a pass-through of stg_inventory. It includes identifiers (inventory_id, tag_id, item_id_width), weights (weight, weight_reserved, weight_available), dimensions, classification_id and classification_description, status and location fields, reservation fields (customer_id_reserved, is_customer_reserved), and calculated fields (is_in_inventory, is_child, is_parent, days_in_inventory, inventory_aging_bucket, is_coil). Data is sourced from stg_inventory.
    columns:
      - name: inventory_id
        description: The unique identifier for each inventory item. This is an integer value.
        data_type: int64
        quote: true
      - name: tag_id
        description: The unique tag associated with each inventory item. This is a string value.
        data_type: string
        quote: true
      - name: item_id_width
        description: Composite key combining item_id and width, formatted as 'item_id-width'. If width is null, contains just the item_id as a string. Used for joining with item master.
        data_type: string
        quote: true
      - name: warehouse_id
        description: The unique identifier for the warehouse where the inventory item is stored. This is an integer value.
        data_type: int64
        quote: true
      - name: vendor_id
        description: An integer identifier for the vendor associated with the inventory item.
        data_type: int64
        quote: true
      - name: gauge_id
        description: An integer identifier for the gauge of the inventory item. This refers to the thickness of the item.
        data_type: int64
        quote: true
      - name: po_number
        description: A string identifier for the purchase order associated with the inventory item. This is typically a unique identifier provided by the vendor.
        data_type: string
        quote: true
      - name: po_line
        description: The 'po_line' column represents the line number of the purchase order. It is an integer value that helps in identifying the specific line item in a purchase order.
        data_type: int64
        quote: true
      - name: item_id
        description: The 'item_id' column is a unique identifier for each item in the inventory. It is an integer value that helps in uniquely identifying each item in the inventory.
        data_type: int64
        quote: true
      - name: location_id
        description: The 'location_id' column represents the unique identifier for the location of the item in the warehouse. It is an integer value that helps in identifying the specific location of an item in the warehouse.
        data_type: int64
        quote: true
      - name: parent_inventory_id
        description: This is an integer field that represents the unique identifier of the parent inventory. If an inventory item is part of a larger inventory, this field will contain the ID of that larger inventory. If the inventory item is not part of any larger inventory, this field will be null.
        data_type: int64
        quote: true
      - name: piw
        description: This is a numeric field that represents the 'Pounds per Inch Width' of the inventory item. It is a measure of the density of the material of the inventory item.
        data_type: numeric
        quote: true
      - name: feet
        description: This is a numeric field that represents the length of the inventory item in feet. It is used to measure the physical size of the inventory item.
        data_type: numeric
        quote: true
      - name: length
        description: The length of the inventory item, measured in standard units. This field is numeric and can contain decimal values.
        data_type: numeric
        quote: true
      - name: pieces
        description: The number of individual pieces of the inventory item. This field is an integer and can only contain whole numbers.
        data_type: int64
        quote: true
      - name: weight
        description: The weight of the inventory item, measured in standard units. This field is numeric and can contain decimal values.
        data_type: numeric
        quote: true
      - name: weight_reserved_hard
        description: The weight that is hard-reserved (committed) for orders. Sourced from base_inventory.
        data_type: numeric
        quote: true
      - name: weight_reserved
        description: Alias for weight_reserved_hard. The weight reserved for orders.
        data_type: numeric
        quote: true
      - name: weight_available
        description: Weight available for new orders. Calculated as weight minus weight_reserved_hard.
        data_type: numeric
        quote: true
      - name: freight
        description: The freight column represents the cost that was incurred to transport the inventory item from the vendor to the warehouse. It is represented as a numeric value.
        data_type: numeric
        quote: true
      - name: Qty
        description: The Qty column represents the quantity of the inventory item currently in stock. It is represented as an integer value.
        data_type: int64
        quote: true
      - name: qty_on_order
        description: The qty_on_order column represents the quantity of the inventory item that is currently on order but has not yet been received. It is represented as an integer value.
        data_type: int64
        quote: true
      - name: feet_on_order
        description: This column represents the total feet of inventory items that are currently on order. The data type is numeric.
        data_type: numeric
        quote: true
      - name: weight_on_order
        description: This column represents the total weight of inventory items that are currently on order. The data type is numeric.
        data_type: numeric
        quote: true
      - name: Cost
        description: This column represents the total cost of the inventory items. The data type is numeric.
        data_type: numeric
        quote: true
      - name: status_code
        description: The status_code column represents the current status of the inventory item. It is a string type and can contain various status codes that represent different stages or conditions of the inventory item.
        data_type: string
        quote: true
      - name: item_number
        description: The item_number column represents the unique identifier for each inventory item. It is a string type and is used to track and manage inventory items throughout their lifecycle.
        data_type: string
        quote: true
      - name: mic_1
        description: The mic_1 column represents the first measurement of the inventory item's thickness in micrometers. It is a numeric type and is used for quality control and specification purposes.
        data_type: numeric
        quote: true
      - name: mic_2
        description: This column represents the second measurement of the thickness of the metal in micrometers. It is a numeric value.
        data_type: numeric
        quote: true
      - name: width
        description: This column represents the width of the inventory item. It is a numeric value.
        data_type: numeric
        quote: true
      - name: thickness
        description: This column represents the thickness of the inventory item. It is a numeric value.
        data_type: numeric
        quote: true
      - name: diffrence_nom_mic
        description: This column represents the numerical difference between the nominal and actual micrometer measurements of the inventory item. It is used to track any discrepancies in the item's thickness.
        data_type: numeric
        quote: true
      - name: receiving_date
        description: This column represents the date when the inventory item was received in the warehouse. It is used to track the inventory's age and manage stock rotation.
        data_type: date
        quote: true
      - name: classification_id
        description: Foreign key to the inventory classification (base_inventory_classifcations). Identifies the classification category of the inventory item.
        data_type: int64
        quote: true
      - name: customer_id_reserved
        description: Reserved customer ID for the inventory row; normalized to null when the source value is 0 in base_inventory.
        data_type: int64
        quote: true
      - name: is_customer_reserved
        description: Boolean flag indicating whether the inventory row is reserved for a customer (true when customer_id_reserved is populated).
        data_type: boolean
        quote: true
      - name: status_description
        description: This column provides a textual description of the current status of the inventory item. It can include statuses like 'In Stock', 'Out of Stock', 'On Order', etc. This is used for inventory management and reporting.
        data_type: string
        quote: true
      - name: classification_description
        description: Human-readable description of the inventory classification. Sourced from base_inventory_classifcations via classification_id.
        data_type: string
        quote: true
      - name: is_in_inventory
        description: A boolean field indicating whether the item is currently in inventory. True if the item is in inventory, false otherwise.
        data_type: boolean
        quote: true
      - name: location_name
        description: A string field representing the name of the location where the inventory item is stored.
        data_type: string
        quote: true
      - name: Warehouse
        description: A string field representing the name of the warehouse where the inventory item is stored.
        data_type: string
        quote: true
      - name: is_excess
        description: A boolean field indicating whether the inventory item is in excess. If true, the item is in excess of the required quantity.
        data_type: boolean
        quote: true
      - name: is_inactive
        description: A boolean field indicating whether the inventory item is inactive. If true, the item is not currently in use or circulation.
        data_type: boolean
        quote: true
      - name: is_child
        description: A boolean field indicating whether the inventory item is a child item. If true, the item is a sub-component or part of a larger item or assembly.
        data_type: boolean
        quote: true
      - name: is_parent
        description: A boolean field indicating whether the inventory item is a parent item. If true, the item has child items associated with it.
        data_type: boolean
        quote: true
      - name: days_in_inventory
        description: An integer field representing the number of days the item has been in the inventory. This is calculated from the receiving date to the current date.
        data_type: int64
        quote: true
      - name: inventory_aging_bucket
        description: A string field categorizing the age of the inventory item. This is based on the 'days_in_inventory' field and can be used for inventory management and analysis.
        data_type: string
        quote: true
      - name: is_coil
        description: True when length = 0, indicating the inventory item is a coil rather than cut length.
        data_type: boolean
        quote: true
  - name: item_master
    description: |
      The item_master model is a comprehensive table that contains detailed information about each item in the inventory. 
      It includes columns for item identification, product code, item category, type description, item grade, item name, 
      item description, item density, standard cost, item creation date, material type, and gauge information. 
      The data for this model is sourced from the 'stg_item_master' staging table.
    columns:
      - name: item_id_width
        description: Composite key combining item_id and width, formatted as 'item_id-width'. If width is null, contains just the item_id as a string.
        data_type: string
        quote: true
      - name: item_id
        description: A unique identifier for each item in the item master table.
        data_type: int64
        quote: true
      - name: product_code
        description: The code associated with the product. This is typically a manufacturer's part number or other identifier that is unique to the product.
        data_type: string
        quote: true
      - name: item_category
        description: The category to which the item belongs. This is typically a high-level grouping of similar items.
        data_type: string
        quote: true
      - name: type_description
        description: This column contains the original description of the item type as provided in the source data (trimmed).
        data_type: string
        quote: true
      - name: type_description_fixed
        description: |
          Normalized version of type_description that consolidates similar type descriptions:
          - Any type containing 'STAINLESS' is mapped to 'STAINLESS STEEL'
          - Any type containing 'HOT ROLLED' is mapped to 'HOT ROLLED'
          - All other types retain their original type_description value
        data_type: string
        quote: true
      - name: item_grade
        description: This column represents the grade or quality level of the item. The grading system may vary depending on the specific item type.
        data_type: string
        quote: true
      - name: item_name
        description: The name of the item in the item master. This is a unique identifier for each item.
        data_type: string
        quote: true
      - name: item_description
        description: A detailed description of the item. This provides more context about the item beyond its name.
        data_type: string
        quote: true
      - name: item_density
        description: The density of the item. This is a physical property of the item that can be used for calculations in other models.
        data_type: numeric
        quote: true
      - name: standard_cost
        description: The standard cost of the item. This is the cost that is usually expected to be incurred to produce the item.
        data_type: numeric
        quote: true
      - name: avg_inventory_cost_per_100_weight
        description: |
          The average inventory cost per 100 lbs (CWT) for this item, calculated from inventory records received within the last year.
          
          **Calculation Logic:**
          - Includes inventory items where is_in_inventory = true
          - Includes items received within the last year
          - Includes coils (length = 0) OR sheets with standard widths (48, 60, 78 inches where length > 0)
          - Averaged by item_id_width and rounded to 2 decimal places
        data_type: numeric
        quote: true
      - name: avg_inventory_cost_per_pound
        description: |
          The average inventory cost per pound for this item, derived from avg_inventory_cost_per_100_weight / 100.
          
          **Calculation Logic:**
          - Based on the same inventory filtering as avg_inventory_cost_per_100_weight
          - Includes coils (length = 0) OR sheets with standard widths (48, 60, 78 inches where length > 0)
          - Rounded to 2 decimal places
        data_type: numeric
        quote: true
      - name: width
        description: The width of the item from inventory or orders.
        data_type: numeric
        quote: true
      - name: item_create_date
        description: The date when the item was created in the system. This is usually the date when the item was first introduced into the system.
        data_type: date
        quote: true
      - name: material_type
        description: |
          Categorizes items into material types based on type_description:
          - 'Copper' for COPPER items
          - 'Aluminum' for ALUMINUM items
          - 'Steel' for COLD ROLLED, ALUMINIZED, GALVANIZED, GALVANNEALED, HOT ROLLED, HOT ROLLED BLACK, HOT ROLLED P&O, STAINLESS, STAINLESS STEEL items
          - 'Other' for all other items
        data_type: string
        quote: true
      - name: item_gauge
        description: |
          The gauge of the item extracted from the product_code using regex:
          - For Steel: extracts patterns like '20G', '1/4', or plain numbers
          - For Copper/Aluminum: extracts decimal patterns like '.032'
          - Returns 'Other' for unmatched patterns
        data_type: string
        quote: true
      - name: item_gauge_numeric
        description: The numeric gauge value for Copper and Aluminum items, cast as decimal from the extracted gauge pattern. Null for Steel and Other material types.
        data_type: numeric
        quote: true
  - name: orders
    description: |
      The 'orders' model contains detailed information about each order placed. It includes identifiers for the order, customer, sales persons, items, and invoices. It also contains information about the order such as the quantity, weight, dimensions, cost, tax, and shipping details. Additionally, it includes the status of the order and whether certain conditions apply to the order such as if it has a spacer, forklift, paper wrap, credit release, is open, complete, credited, or has an invoice. The model also includes dates related to the order and invoice. The model is enriched with item master data including material type, type description, item grade, item gauge, and item width. For aluminum orders, it also includes Texarkana adders for gauge and width-based pricing adjustments.
      
      **Data Source Dependencies:**
      This model inherits conditional inventory join logic from its upstream dependency `stg_orders`. The inventory-related fields (inventory_cost, item_number, inventory_tag) may come from either:
      - Invoice inventory records (when base_invoice.inventory_id is not null)
      - Finished item inventory records (when no invoice inventory exists)
      
      This conditional logic ensures comprehensive inventory information is available for cost calculations and replacement cost analysis.
    columns:
      - name: order_id
        description: Unique identifier for the order.
        data_type: int64
        quote: true
      - name: customer_id
        description: Identifier for the customer placing the order.
        data_type: int64
        quote: true
      - name: customer_po
        description: Customer purchase order number.
        data_type: string
        quote: true
      - name: primary_sales_person_id
        description: This column represents the unique identifier for the primary sales person associated with the order.
        data_type: int64
        quote: true
      - name: secondary_sales_person_id
        description: This column represents the unique identifier for the secondary sales person associated with the order, if applicable.
        data_type: int64
        quote: true
      - name: primary_sales_person_username
        description: This column represents the username for the primary sales person associated with the order.
        data_type: string
        quote: true
      - name: secondary_sales_person_username
        description: The username of the secondary sales person associated with the order. This is a string value.
        data_type: string
        quote: true
      - name: order_number
        description: Order number.
        data_type: int64
        quote: true
      - name: item_id
        description: The unique identifier for each item in the order. This is a string value.
        data_type: int64
        quote: true
      - name: order_line_id
        description: Unique identifier for each line item in an order. This is a primary key in the orders table.
        data_type: int64
        quote: true
      - name: invoice_id
        description: Unique identifier for each invoice generated for an order. This is a foreign key that links to the invoices table.
        data_type: int64
        quote: true
      - name: invoice_line_id
        description: Unique identifier for each line item in an invoice. This is a primary key in the invoice lines table.
        data_type: int64
        quote: true
      - name: order_line_number
        description: This column represents the line number of each order in the order processing system. It is a unique identifier for each line item in an order.
        data_type: int64
        quote: true
      - name: order_number_line
        description: This column represents the order number associated with each line item. It is used to group line items that belong to the same order.
        data_type: string
        quote: true
      - name: price
        description: This column represents the price of each line item in the order. It is the cost that the customer is charged for the specific item.
        data_type: numeric
        quote: true
      - name: order_qty
        description: The quantity of items in the order. This is a numeric field.
        data_type: numeric
        quote: true
      - name: order_weight
        description: The total weight of the order from the order line. This is a numeric field and is measured in pounds. This column was refactored from 'weight' to 'order_weight' for clarity.
        data_type: numeric
        quote: true
      - name: invoice_weight
        description: The actual weight that was invoiced, which may differ from the order weight due to adjustments, actual measurements, or other factors. This is a numeric field and is measured in pounds.
        data_type: numeric
        quote: true
      - name: net_weight
        description: The net weight of the order after subtracting the weight of the packaging. This is a numeric field and is measured in kilograms.
        data_type: numeric
        quote: true
      - name: gross_weight
        description: The total weight of the order, including packaging and any additional materials. This is measured in kilograms.
        data_type: numeric
        quote: true
      - name: length
        description: The length of the product ordered. This is measured in centimeters.
        data_type: numeric
        quote: true
      - name: width
        description: The width of the product ordered. This is measured in centimeters.
        data_type: numeric
        quote: true
      - name: pieces_amount
        description: The total number of pieces in the order.
        data_type: numeric
        quote: true
      - name: tax_amount
        description: The total tax amount for the order.
        data_type: numeric
        quote: true
      - name: cost_amount
        description: The total cost of the order before tax.
        data_type: numeric
        quote: true
      - name: sale_amount
        description: The total amount of the sale, including tax and any additional fees.
        data_type: numeric
        quote: true
      - name: invoice_amount
        description: The total amount of the invoice, including tax and any additional fees.
        data_type: numeric
        quote: true
      - name: invoice_taxable_amount
        description: The portion of the invoice amount that is subject to tax.
        data_type: numeric
        quote: true
      - name: inventory_cost
        description: The cost of the inventory for each order. This is calculated based on the cost of each item in the order at the time of purchase.
        data_type: numeric
        quote: true
      - name: shippment_method
        description: The method of shipment for the order. This is a string value that can include various shipping methods such as 'FedEx', 'UPS', 'DHL', etc.
        data_type: string
        quote: true
      - name: tax_state
        description: Tax state code applicable to the order.
        data_type: string
        quote: true
      - name: ship_to_company_name
        description: Name of the company at the shipping destination.
        data_type: string
        quote: true
      - name: ship_to_zip
        description: Shipping destination ZIP code.
        data_type: string
        quote: true
      - name: ship_to_city
        description: City for the shipping destination.
        data_type: string
        quote: true
      - name: ship_to_state
        description: State for the shipping destination.
        data_type: string
        quote: true
      - name: ship_to_contact
        description: Formatted contact name at the shipping destination.
        data_type: string
        quote: true
      - name: gauge_max
        description: The maximum gauge of the metal for the order.
        data_type: numeric
        quote: true
      - name: gauge_min
        description: The minimum gauge of the metal used in the order. Gauge is a measurement of the thickness of the metal, with a higher gauge indicating a thinner metal.
        data_type: numeric
        quote: true
      - name: thickness
        description: The thickness of the metal used in the order, measured in millimeters. This is a more precise measurement than gauge.
        data_type: numeric
        quote: true
      - name: item_number
        description: The unique identifier for each item in the order. This can be used to track individual items and their associated data.
        data_type: string
        quote: true
      - name: inventory_tag
        description: The unique identifier for each item in the inventory. This tag is used to track the item throughout the order process.
        data_type: string
        quote: true
      - name: status_code
        description: The code representing the current status of the order. This code is used internally for tracking and reporting purposes.
        data_type: string
        quote: true
      - name: status_description
        description: A detailed description of the current status of the order. This provides more context to the status code and is used for communication with customers and stakeholders.
        data_type: string
        quote: true
      - name: order_date
        description: Date the order was placed.
        data_type: date
        quote: true
      - name: quote_date
        description: Date the quote was generated.
        data_type: date
        quote: true
      - name: order_due_date
        description: Due date for the order.
        data_type: date
        quote: true
      - name: invoice_date
        description: The date when the invoice was created. This is typically the date when the order was confirmed and is in the format YYYY-MM-DD.
        data_type: date
        quote: true
      - name: invoice_posted_date
        description: The date when the invoice was posted or sent to the customer. This is typically a few days after the invoice_date and is in the format YYYY-MM-DD.
        data_type: date
        quote: true
      - name: transaction_date
        description: The date when the transaction was completed, i.e., when the payment was received from the customer. This is typically a few days after the invoice_posted_date and is in the format YYYY-MM-DD.
        data_type: date
        quote: true
      - name: has_spacer
        description: Indicates whether the order includes spacers.
        data_type: boolean
        quote: true
      - name: has_forklift
        description: Indicates whether a forklift is required for the order.
        data_type: boolean
        quote: true
      - name: has_paper_wrap
        description: Indicates whether the order requires paper wrapping.
        data_type: boolean
        quote: true
      - name: has_credit_release
        description: A boolean column indicating whether the order has a credit release. True if the order has a credit release, false otherwise.
        data_type: boolean
        quote: true
      - name: is_open_order
        description: A boolean column indicating whether the order is still open. True if the order is open, false otherwise.
        data_type: boolean
        quote: true
      - name: is_order_complete
        description: A boolean column indicating whether the order is complete. True if the order is complete, false otherwise.
        data_type: boolean
        quote: true
      - name: is_credited_order
        description: A boolean field indicating whether the order has been credited or not. A value of 'true' means the order has been credited, while 'false' means it has not.
        data_type: boolean
        quote: true
      - name: has_invoice
        description: A boolean field indicating whether an invoice has been generated for the order. A value of 'true' means an invoice exists, while 'false' means it does not.
        data_type: boolean
        quote: true
      - name: weight_outstanding
        description: This column represents the outstanding weight of the order. It is calculated as the difference between the total weight of the order and the weight of the order that has been fulfilled. The data type is numeric.
        data_type: numeric
        quote: true
      - name: quantity_outstanding
        description: This column represents the outstanding quantity of the order. It is calculated as the difference between the total quantity of the order and the quantity of the order that has been fulfilled. The data type is int64.
        data_type: int64
        quote: true
      - name: open_dollars
        description: This column represents the outstanding dollar amount of the order. It is calculated as the difference between the total dollar amount of the order and the dollar amount of the order that has been paid. The data type is numeric.
        data_type: numeric
        quote: true
      - name: receiving_hours
        description: The hours during which the shipment can be received. This is a string field that typically contains a range of hours, e.g., '9:00 AM - 5:00 PM'.
        data_type: string
        quote: true
      - name: max_skid_weight
        description: The maximum weight (in pounds) that a skid can hold. This is an integer field and is used to ensure that the weight of the items being shipped does not exceed the capacity of the skid.
        data_type: int64
        quote: true
      - name: printed_comment
        description: Any additional comments or instructions that are printed on the order. This is a string field and can contain any text that is relevant to the order, such as special handling instructions or notes about the order.
        data_type: string
        quote: true
      - name: material_type
        description: The type of material for the item in the order (e.g., 'Aluminum', 'Steel', 'Copper', 'Other'). This is derived from the item master data and is used for categorization and pricing purposes.
        data_type: string
        quote: true
      - name: type_description
        description: The description of the item type from the item master (e.g., 'ALUMINUM', 'COLD ROLLED', 'GALVANIZED'). This provides detailed information about the specific type of material.
        data_type: string
        quote: true
      - name: item_grade
        description: The grade or quality level of the item from the item master. This indicates the quality specifications of the material.
        data_type: string
        quote: true
      - name: item_width
        description: The width of the item from the item master. This represents the standard width dimension for the item and is used for width-based pricing calculations.
        data_type: numeric
        quote: true
      - name: gauge_adder_amount
        description: The gauge-based pricing adder amount for aluminum orders at the Texarkana facility. This is applied based on the gauge range and aluminum type for the order date.
        data_type: numeric
        quote: true
      - name: width_adder_amount
        description: The width-based pricing adder amount for aluminum orders at the Texarkana facility. This is applied based on the width range for the order date.
        data_type: numeric
        quote: true
      - name: total_adder_amount
        description: The combined total of gauge and width adder amounts for aluminum orders at the Texarkana facility. This represents the total pricing adjustment applied to the order.
        data_type: numeric
        quote: true
      - name: item_gauge_numeric
        description: The numeric gauge value for the item, extracted from the product code for copper and aluminum materials. This is used for gauge-based pricing calculations.
        data_type: numeric
        quote: true
      - name: midwest_price
        description: The most recent Midwest aluminum ingot price per pound. This is used for aluminum pricing calculations and is sourced from the aluminum ingot pricing table.
        data_type: numeric
        quote: true
      - name: grade_for_texarkana
        description: The aluminum grade specifically formatted for Texarkana pricing calculations. Extracts '3003' or '5052' from the item grade for use in Texarkana adder lookups.
        data_type: string
        quote: true
      - name: freight_adder_amount
        description: The freight adder amount for steel orders. This represents the additional cost per hundredweight for freight charges on steel products.
        data_type: numeric
        quote: true
      - name: coating_amount
        description: The coating amount for galvanized steel orders. This represents the additional cost per hundredweight for galvanized coating on steel products.
        data_type: numeric
        quote: true
      - name: steel_gauge_adder_amount
        description: The gauge adder amount for steel orders. This represents the additional cost per hundredweight based on the steel gauge thickness.
        data_type: numeric
        quote: true
      - name: price_value_per_pound
        description: The most recent daily CRU price per pound for the material type. This is used for steel pricing calculations and is sourced from the daily CRU pricing table.
        data_type: numeric
        quote: true
      - name: replacement_cost
        description: The calculated replacement cost for the order, including base material cost, Texarkana adders (for aluminum), steel adders (for steel), and CRU pricing. Calculated as (total_cost_per_pound * order_weight) + 45, where 45 is a fixed cost per skid (each line item gets its own skid). This represents the total cost to replace the ordered material.
        data_type: numeric
        quote: true
      - name: replacement_inv_avg_cost
        description: The calculated replacement cost using average inventory cost per pound instead of current pricing. Calculated as (avg_inventory_cost_per_pound * order_weight) + 45, where 45 is a fixed cost per skid (each line item gets its own skid). This provides an alternative cost basis using historical average inventory costs.
        data_type: numeric
        quote: true
      - name: total_cost_per_pound
        description: The calculated total cost per pound for the item, derived from the item_cost model.
        data_type: numeric
        quote: true
      - name: is_late_shipment
        description: Boolean flag indicating if the shipment is considered late based on the shipment method and due dates.
        data_type: boolean
        quote: true

  - name: item_cost
    description: |
      The 'item_cost' model provides comprehensive cost calculations for all items in the item master, incorporating
      various pricing components including aluminum ingot pricing, Texarkana facility adders, steel pricing components,
      and daily CRU pricing. This model serves as the foundation for accurate cost analysis and pricing decisions
      across the organization.
      
      The model calculates total cost per pound by combining base material costs with applicable adders and pricing
      adjustments based on material type, gauge, width, and other specifications. It supports both aluminum and steel
      pricing methodologies with facility-specific adjustments.
    columns:
      - name: item_id_width
        description: Unique identifier combining item_id and width for items with multiple width variations.
        data_type: string
        quote: true
      - name: item_id
        description: Unique identifier for each item in the item master.
        data_type: int64
        quote: true
      - name: product_code
        description: The product code associated with the item, typically a manufacturer's part number or identifier.
        data_type: string
        quote: true
      - name: item_category
        description: The category to which the item belongs, providing high-level grouping of similar items.
        data_type: string
        quote: true
      - name: type_description
        description: The original description of the item type as provided in the source data (e.g., 'ALUMINUM', 'GALVANIZED').
        data_type: string
        quote: true
      - name: type_description_fixed
        description: The cleaned and standardized description of the item type after applying necessary transformations.
        data_type: string
        quote: true
      - name: item_grade
        description: The grade or quality level of the item, indicating the quality specifications of the material.
        data_type: string
        quote: true
      - name: item_name
        description: The name of the item in the item master, serving as a unique identifier.
        data_type: string
        quote: true
      - name: item_description
        description: A detailed description of the item providing context beyond its name.
        data_type: string
        quote: true
      - name: item_density
        description: The density of the item, a physical property used for calculations in other models.
        data_type: numeric
        quote: true
      - name: standard_cost
        description: The standard cost of the item, representing the expected cost to produce the item.
        data_type: numeric
        quote: true
      - name: width
        description: The width of the item in inches, a critical dimension for many applications.
        data_type: numeric
        quote: true
      - name: item_create_date
        description: The date when the item was created in the system.
        data_type: date
        quote: true
      - name: material_type
        description: The type of material the item is made of (e.g., 'Aluminum', 'Steel', 'Copper', 'Other').
        data_type: string
        quote: true
      - name: item_gauge
        description: The gauge of the item extracted from the product code, representing thickness specifications.
        data_type: string
        quote: true
      - name: item_gauge_numeric
        description: The numeric gauge value for copper and aluminum materials, used for gauge-based pricing calculations.
        data_type: numeric
        quote: true
      - name: item_width
        description: The width of the item from the item master, used for width-based pricing calculations.
        data_type: numeric
        quote: true
      - name: grade_for_texarkana
        description: The aluminum grade specifically formatted for Texarkana pricing calculations, extracting '3003' or '5052' from the item grade.
        data_type: string
        quote: true
      - name: gauge_adder_amount
        description: The gauge-based pricing adder amount for aluminum items at the Texarkana facility, applied based on gauge range and aluminum type.
        data_type: numeric
        quote: true
      - name: width_adder_amount
        description: The width-based pricing adder amount for aluminum items at the Texarkana facility, applied based on width range.
        data_type: numeric
        quote: true
      - name: freight_adder_amount
        description: The freight adder amount for steel items, representing additional cost per hundredweight for freight charges.
        data_type: numeric
        quote: true
      - name: coating_amount
        description: The coating amount for galvanized steel items, representing additional cost per hundredweight for galvanized coating.
        data_type: numeric
        quote: true
      - name: steel_gauge_adder_amount
        description: The gauge adder amount for steel items, representing additional cost per hundredweight based on steel gauge thickness.
        data_type: numeric
        quote: true
      - name: price_value_per_pound
        description: The most recent daily CRU price per pound for the material type, used for steel pricing calculations.
        data_type: numeric
        quote: true
      - name: midwest_price
        description: The most recent Midwest aluminum ingot price per pound, used for aluminum pricing calculations.
        data_type: numeric
        quote: true
      - name: total_cost_per_pound
        description: The calculated total cost per pound, including base material cost, Texarkana adders (for aluminum), steel adders (for steel), and CRU pricing.
        data_type: numeric
        quote: true

  - name: sales_targets
    description: Monthly sales targets
    columns:
      - name: Month_Start_Date
        description: The start date of the month for which the sales target is set. The date is in the format YYYY-MM-DD.
        data_type: date
        quote: true
      - name: Sales_Target
        description: The sales target set for the month. This is a numeric value representing the sales goal.
        data_type: int64
        quote: true
  - name: salesperson
    description: The salesperson model contains information about each salesperson in the company. This includes their unique identifier (salesperson_id), credit limit (credit_limit), username (username), first name (first_name), last name (last_name), full name (full_name), email address (email), and whether they are currently active in the company (is_active). The data is sourced from the 'stg_salesperson' table in the 'quality-metals-prod' database.
    columns:
      - name: salesperson_id
        description: Unique identifier for each salesperson in the database.
        data_type: int64
        tests:
          - not_null
          - unique
        quote: true
      - name: credit_limit
        description: The maximum amount that a salesperson is allowed to borrow from the company.
        data_type: numeric
        quote: true
      - name: username
        description: The username that a salesperson uses to log into the system.
        data_type: string
        quote: true
      - name: first_name
        description: The first name of the salesperson.
        data_type: string
        quote: true
      - name: last_name
        description: The last name of the salesperson.
        data_type: string
        quote: true
      - name: full_name
        description: The full name of the salesperson, which is a combination of the first name and the last name.
        data_type: string
        quote: true
      - name: email
        description: The email address of the salesperson. This is a unique identifier for each salesperson in the system.
        data_type: string
        quote: true
      - name: is_active
        description: A boolean flag indicating whether the salesperson is currently active. A value of 'true' means the salesperson is active, while 'false' means they are not.
        data_type: boolean
        quote: true
  - name: gl_master
    description: The gl_master model is a representation of the general ledger master data. It contains information about the general ledger number (GLNumber), comments, description, financial statement function (FSfunction), ratio code, GL level, ratio code description, company address (coaddress1, coaddress2, cocity, costate, cozip), company name, debit or credit account (DrCrAcct), subtotal GL number, and flags for inactive and hide inactive. The data is sourced from the 'stg_gl_master' table in the 'quality-metals-prod' database.
    columns:
      - name: GLNumber
        description: The unique identifier for each General Ledger account. This is a numeric field.
        data_type: string
        quote: true
      - name: Comments
        description: This field contains any additional notes or comments related to the General Ledger account. This is a text field.
        data_type: int64
        quote: true
      - name: Description
        description: This field provides a brief description of the General Ledger account. This is a text field.
        data_type: string
        quote: true
      - name: FSfunction
        description: The FSfunction column represents the financial statement function associated with the general ledger entry. This could include categories such as 'Revenue', 'Expenses', 'Assets', etc.
        data_type: string
        quote: true
      - name: RatioCode
        description: The RatioCode column is a unique identifier for the ratio associated with the general ledger entry. This code is used to link the entry to its corresponding ratio in the financial analysis model.
        data_type: int64
        quote: true
      - name: GLLevel
        description: The GLLevel column indicates the hierarchical level of the general ledger entry within the financial statement structure. Higher numbers represent more detailed levels of the financial statement.
        data_type: int64
        quote: true
      - name: RatioCodeDesc
        description: This column contains the description of the ratio code used in the general ledger.
        data_type: int64
        quote: true
      - name: coaddress1
        description: This column contains the first line of the company's address.
        data_type: string
        quote: true
      - name: coaddress2
        description: This column contains the second line of the company's address.
        data_type: int64
        quote: true
      - name: cocity
        description: The city where the company is located.
        data_type: string
        quote: true
      - name: costate
        description: The state where the company is located.
        data_type: string
        quote: true
      - name: cozip
        description: The zip code of the company's location.
        data_type: string
        quote: true
      - name: CompanyName
        description: The official name of the company associated with the general ledger entry.
        data_type: string
        quote: true
      - name: DrCrAcct
        description: Indicates whether the general ledger account is a debit or credit account.
        data_type: string
        quote: true
      - name: SubtotalGLNumber
        description: The subtotal of the general ledger number, which is used for grouping related accounts.
        data_type: string
        quote: true
      - name: Inactive
        description: This column indicates whether a record in the gl_master model is inactive. A value of '1' means the record is inactive, while a value of '0' means the record is active.
        data_type: boolean
        quote: true
      - name: HideInactive
        description: This column indicates whether inactive records in the gl_master model should be hidden. A value of '1' means inactive records are hidden, while a value of '0' means inactive records are visible.
        data_type: boolean
        quote: true
  - name: top_monthly_salespeople
    description: The 'top_monthly_salespeople' model provides a monthly breakdown of the top inside and outside salespeople based on the total sales amount. The model includes the sales month, the IDs and names of the top primary and secondary salespeople, and the total sales amount for each. The data is sourced from the 'stg_orders' and 'stg_salesperson' tables in the 'quality-metals-prod' database. The model is ordered by sales month in descending order.
    columns:
      - name: month_year
        description: This column represents the month and year of the sales data in the format 'YYYY-MM'. It is derived from the 'sales_month' column by formatting the date to only include the year and month.
        data_type: string
        quote: true
      - name: sales_month
        description: This column represents the month and year of the sales data as a date object. It is derived from the 'order_date' column in the 'orders' table by truncating the date to the month level.
        data_type: date
        quote: true
      - name: top_inside_salesperson_id
        description: This column represents the ID of the salesperson who had the highest total sales for the month. It is derived from the 'primary_sales_person_id' column in the 'orders' table, with the salesperson having the highest sum of 'sale_amount' for each month being selected.
        data_type: int64
        quote: true
      - name: top_inside_salesperson_name
        description: The name of the salesperson who achieved the highest sales in a given month. This is derived from the 'username' column in the 'stg_salesperson' source table.
        data_type: string
        quote: true
      - name: inside_sales_amount
        description: The total sales amount achieved by the top primary salesperson in a given month. This is calculated by summing the 'sale_amount' for all orders associated with the top primary salesperson's ID in the 'stg_orders' source table.
        data_type: numeric
        quote: true
      - name: top_outside_salesperson_id
        description: The ID of the salesperson who achieved the second highest sales in a given month. This is derived from the 'secondary_sales_person_id' column in the 'stg_orders' source table.
        data_type: int64
        quote: true
      - name: top_outside_salesperson_name
        description: The name of the salesperson who achieved the second highest sales in a given month. This is derived from the 'username' column in the 'stg_salesperson' source table, where the 'salesperson_id' matches the 'secondary_sales_person_id' from the 'top_secondary_salespeople' subquery in the SQL.
        data_type: string
        quote: true
      - name: outside_sales_amount
        description: The total sales amount achieved by the top secondary salesperson in a given month. This is derived from the 'total_sales' column in the 'top_secondary_salespeople' subquery in the SQL, where the sales rank is 1.
        data_type: numeric
        quote: true
  - name: ar_journal
    description: Final reporting model for AR journal entries, selecting all columns from the stg_ar_journal stage table for analytics and business reporting.
    columns:
      - name: ar_journal_id
        description: Unique identifier for the AR journal entry.
      - name: invoice_number
        description: Invoice number associated with the AR journal entry.
      - name: payment_id
        description: Payment identifier associated with the AR journal entry.
      - name: customer_id
        description: Customer identifier associated with the AR journal entry.
      - name: amount_pieces
        description: Number of pieces in the AR journal entry.
      - name: amount_feet
        description: Number of feet in the AR journal entry.
      - name: days_from_transaction
        description: Number of days from the transaction date to today.
      - name: amount_open
        description: The open amount for the AR journal entry.
      - name: is_open_invoice
        description: Boolean flag indicating if the invoice is open (open amount > 0).
      - name: amount_discount
        description: Discount amount applied to the AR journal entry.
      - name: amount_original
        description: Original amount of the AR journal entry before discounts.
      - name: total_amount
        description: Total amount after discounts (original amount minus discount amount).
      - name: transaction_date
        description: The date of the AR journal transaction.
      - name: aging_bucket
        description: "Aging bucket for open invoices based on days from transaction: 0-30, 31-90, 91-180, 181-365, 366+. Null if not open."
      - name: due_date
        description: The date the invoice is due, calculated as transaction_date plus due_days from the customer.
      - name: discount_date
        description: The last date a discount is available, calculated as transaction_date plus discount_days from the customer.
  - name: daily_invoice_report
    description: Daily invoice report showing metrics for cost, sale, weight, and invoice amounts for invoices posted on the last workday (the most recent weekday before today, with Monday and weekend runs showing Friday). Built from a detail CTE (line-level rows from orders); the final output selects detail rows from the CTE and unions customer totals aggregated from the same CTE so detail and totals stay consistent. Includes invoice_posted_date in both detail and total rows. Profit is calculated as invoice_amount minus calculated_cost_amount, with credits using invoice_amount directly and a special case for customer_id 5586 (Xetex) pre-invoice rows where invoice_amount = 0, where profit is forced to 0 to avoid artificial losses.
    columns:
      - name: customer_name
        description: The name of the customer.
        data_type: string
        quote: true
      - name: product_code
        description: The product code.
        data_type: string
        quote: true
      - name: item_category
        description: The item category.
        data_type: string
        quote: true
      - name: item_name
        description: The name of the item from the item master.
        data_type: string
        quote: true
      - name: type_description
        description: The type description of the item from the item master.
        data_type: string
        quote: true
      - name: material_type
        description: The material type of the item from the item master.
        data_type: string
        quote: true
      - name: item_gauge
        description: The gauge of the item from the item master.
        data_type: string
        quote: true
      - name: width
        description: The width of the item.
        data_type: numeric
        quote: true
      - name: thickness
        description: The thickness of the item.
        data_type: numeric
        quote: true
      - name: length
        description: The length of the item.
        data_type: numeric
        quote: true
      - name: order_number
        description: The order number for the detail row. Null for total rows.
        data_type: string
        quote: true
      - name: status_code
        description: The status code of the order. Null for total rows.
        data_type: string
        quote: true
      - name: order_weight
        description: The weight of the item from the order for the detail row or the total order weight for the group (if total row). This column was refactored from 'weight' to 'order_weight' for clarity.
        data_type: numeric
        quote: true
      - name: invoice_weight
        description: The actual weight that was invoiced for the detail row or the total invoice weight for the group (if total row). This may differ from the order weight due to adjustments or actual measurements.
        data_type: numeric
        quote: true
      - name: order_qty
        description: The order quantity for the detail row or the total quantity for the group (if total row).
        data_type: numeric
        quote: true
      - name: sale_amount
        description: The sale amount for the detail row or the total sales amount for the group (if total row).
        data_type: numeric
        quote: true
      - name: cost_amount
        description: The cost amount for the detail row (from calculated_cost_amount in the detail CTE) or the total cost amount for the group (sum(cost_amount) from the detail CTE for total rows).
        data_type: numeric
        quote: true
      - name: invoice_amount
        description: The invoice amount for the detail row or the total invoice amount for the group (if total row).
        data_type: numeric
        quote: true
      - name: profit
        description: The profit for the detail row (invoice_amount - cost_amount from the detail CTE; for credits, profit equals invoice_amount; for customer_id 5586 (Xetex) pre-invoice rows where invoice_amount = 0, profit is forced to 0 so those rows do not show artificial negative profit) or the total profit for the group (sum(invoice_amount) - sum(cost_amount) from the detail CTE).
        data_type: numeric
        quote: true
      - name: primary_sales_person_id
        description: The unique identifier for the primary salesperson associated with the order. For total rows, this is the maximum primary salesperson ID in the group.
        data_type: int64
        quote: true
      - name: primary_sales_person_name
        description: The full name of the primary salesperson associated with the order. For total rows, this is the maximum primary salesperson name in the group.
        data_type: string
        quote: true
      - name: secondary_sales_person_id
        description: The unique identifier for the secondary salesperson associated with the order, if applicable. For total rows, this is the maximum secondary salesperson ID in the group.
        data_type: int64
        quote: true
      - name: secondary_sales_person_name
        description: The full name of the secondary salesperson associated with the order, if applicable. For total rows, this is the maximum secondary salesperson name in the group.
        data_type: string
        quote: true
      - name: invoice_posted_date
        description: The date the invoice was posted. For detail rows, this is the actual posted date; for total rows, this is the latest posted date in the group.
        data_type: date
        quote: true
      - name: row_type
        description: Indicates if the row is a detail or total row.
        data_type: string
        quote: true
