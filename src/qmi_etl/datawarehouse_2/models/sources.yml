version: 2

sources:
  - name: sql_server
    database: "{{ env_var('GCP_PROJECT_ID', 'quality-metals-prod') }}"
    schema: "{{ env_var('BQ_DATASET', 'dagster') }}"
    description: >
      Raw tables loaded from SQL Server by Dagster SQL Server assets.
      The source name matches the Dagster key_prefix so lineage connects automatically.
    tables:
      - name: Addresses
      - name: APCashJrn
      - name: APCheckHist
      - name: APComment
      - name: APJrn
      - name: ARJrn
      - name: BankAccounts
      - name: Comments
      - name: Contacts
      - name: Customer
      - name: GeneralLedger_view
      - name: GLAdjSource
      - name: GLAdjSourceAccounts
      - name: GLComment
      - name: GLHistory
      - name: GLLevel
      - name: GLMaster
      - name: GLStdAdj
      - name: GLTransactions
      - name: INInvoiceHead
      - name: INInvoiceLine
      - name: Inventory
      - name: InventoryClassifications
      - name: InventoryHist
      - name: ItemMaster
      - name: OrderLinesOpenPieces_View
      - name: OrderStatus
      - name: OrderStatusCodes
      - name: PartNumber
      - name: PartNumberProcessLine
      - name: POHead
      - name: POLine
      - name: Processes
      - name: RW_ProductionOrderFinishedMaterial
      - name: RW_ProductionOrderHeader
      - name: RW_ProductionOrderHistory
      - name: RW_ProductionOrderPerformance
      - name: RW_PurchaseOrders
      - name: SalesPerson
      - name: SOQT
      - name: SOQtLine
      - name: TaxExemptReasons
      - name: Terms
      - name: Vendor
      - name: WorkStations
      - name: RW_InventoryLocation
      - name: RW_OpenOrders
      - name: ProductionOrderLines
      - name: Warehouse
      - name: TaxCodes
      - name: App_UIC_Category
      - name: App_UIC_Gauge
      - name: App_UIC_Grade
      - name: App_UIC_Size
      - name: App_UIC_Type
      - name: supplies_export
  

  - name: zapier_import
    database: "{{ env_var('GCP_PROJECT_ID', 'quality-metals-prod') }}"
    schema: zapier_import
    description: Data imported via Zapier into BigQuery.
    tables:
      - name: cycle_count_import

  - name: PO_export
    database: "{{ env_var('GCP_PROJECT_ID', 'quality-metals-prod') }}"
    schema: PO_export
    description: BigQuery dataset containing PO-related exports such as supplies_export.
    tables:
      - name: supplies_export
