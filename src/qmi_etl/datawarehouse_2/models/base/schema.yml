  - name: base_supplies_po
    description: "Base model for supplies purchase orders, sourced from the BigQuery table PO_export.supplies_export. Contains purchase order data for supplies including vendor details, part numbers, quantities, and pricing."
    columns:
      - name: supplies_po_line_id
        description: "Unique identifier for the supplies purchase order line."
        tests:
          - unique
          - not_null
      - name: po_number
        description: "Purchase order number for the supplies order."
        tests:
          - not_null
      - name: part_number
        description: "Part number for the supply item."
        tests:
          - not_null
      - name: vendor_part_number
        description: "Vendor's part number for the supply item."
      - name: vendor_name
        description: "Name of the vendor supplying the item."
      - name: vendor_description
        description: "Vendor's description of the item."
      - name: description
        description: "Description of the supply item."
      - name: order_qty
        description: "Quantity ordered."
      - name: u_m
        description: "Unit of measure for the order quantity."
      - name: pkg_qty
        description: "Package quantity."
      - name: price_per_unit
        description: "Price per unit for the supply item. For most items this comes directly from the source price field; for vendor_description = 'Thermal Transfer Paper Label 10060' it is adjusted as price * pkg_qty / order_qty to reflect the effective per-unit price."
      - name: total_price
        description: "Total price for the supply line, calculated as price_per_unit multiplied by pkg_qty when pkg_qty is present, otherwise by order_qty."
      - name: inserted_at
        description: "Timestamp when the record was inserted."
      - name: promise_date
        description: "Promised delivery date from the vendor."